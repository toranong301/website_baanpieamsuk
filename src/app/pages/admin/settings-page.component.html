<section class="mb-3">

        <div class="form-check form-switch mb-2">

            <option>10 ปี</option>

        </div>
        <div class="mt-auto">
          <button type="button" class="btn btn-primary w-100">บันทึกการตั้งค่าระบบ</button>
        </div>
      </div>

</section>
